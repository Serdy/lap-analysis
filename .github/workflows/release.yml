name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.13.0). The tag must already exist.'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: userscripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Unit tests
        run: npm test

      - name: Build userscript
        run: npm run build

      - name: Publish release with the built userscript
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" serious-racing-lean-angle.user.js --clobber
          else
            gh release create "$TAG" serious-racing-lean-angle.user.js \
              --title "$TAG" --generate-notes
          fi
